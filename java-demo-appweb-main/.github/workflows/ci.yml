name: Java demo appweb CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:


# Définition des variables d'environnement
env:
  IMAGE_NAME: usine-logicielle-java

jobs:

  # 🧪 1. BUILD + TEST + GENERATION WAR
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-demo-appweb-main

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: 📦 Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: 🧪 Run server tests (Cucumber + JUnit)
        run: mvn -B -pl server test

      - name: 🏗️ Build WAR with Maven
        run: mvn -B clean package

      - name: ✅ Vérification WAR
        run: ls webapp/target

      # ✅ Upload du WAR pour le job suivant
      - name: 📦 Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-war
          path: webapp/target/webapp.war


  # 🐳 2. BUILD & PUSH DOCKER
  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ✅ Récupération du WAR
      - name: 📥 Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-war
          path: webapp/target

      - name: ✅ Vérification du WAR avant build Docker
        run: ls webapp/target

      - name: 🐳 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build Docker image
        run: docker build -t $IMAGE_NAME .

      - name: 📤 Push Docker image
        run: |
          docker tag $IMAGE_NAME ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest


  # 🚀 3. DEPLOY (placeholder)
  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: 🚀 Deploy
        run: echo "Déploiement via Kubernetes / Ansible"