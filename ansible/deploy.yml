- name: Déploiement application Java Docker
  hosts: nodes
  become: yes
  serial: 1 # déploiement progressif (rolling)

  vars:
    container_name: app-java
    # image_name est injecté via --extra-vars depuis le workflow GitHub Actions

  tasks:
    - name: Installer Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Installer le module Python docker (requis par community.docker)
      apt:
        name: python3-docker
        state: present
        update_cache: yes

    - name: Démarrer Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Supprimer ancien container
      docker_container:
        name: "{{ container_name }}"
        state: absent

    - name: Télécharger image Docker
      docker_image:
        name: "{{ image_name }}"
        source: pull

    - name: Lancer container
      docker_container:
        name: "{{ container_name }}"
        image: "{{ image_name }}"
        state: started
        recreate: yes
        ports:
          - "8080:8080"

    - name: Vérifier container
      command: docker ps
      register: docker_output

    - name: Afficher résultat
      debug:
        var: docker_output.stdout