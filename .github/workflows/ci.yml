name: Java demo appweb CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: usine-logicielle-java

jobs:

  cucumber-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: java-demo-appweb-main

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: 📦 Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: 🧪 Exécution tests Cucumber
        run: mvn -B -pl server test

      - name: ✅ Résumé tests
        run: |
          echo "Tests Cucumber exécutés"

  build:
    runs-on: ubuntu-latest
    needs: cucumber-tests
    defaults:
      run:
        working-directory: java-demo-appweb-main

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: 📦 Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: 🧪 Run server tests
        run: mvn -B -pl server test

      - name: 🏗️ Build WAR
        run: mvn -B clean package

      - name: 🔍 Vérification WAR
        run: ls webapp/target

      - name: 📦 Upload WAR
        uses: actions/upload-artifact@v4
        with:
          name: webapp-war
          path: java-demo-appweb-main/webapp/target/*.war

  docker:
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: java-demo-appweb-main

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download WAR
        uses: actions/download-artifact@v4
        with:
          name: webapp-war
          path: java-demo-appweb-main/webapp/target

      - name: 🔍 Vérification
        run: ls webapp/target

      - name: 📦 Préparer WAR pour Docker
        run: |
          FILE=$(ls webapp/target/*.war | head -n 1)
          TARGET="webapp/target/webapp.war"

          if [ "$FILE" != "$TARGET" ]; then
            echo "Renommage WAR"
            cp "$FILE" "$TARGET"
          else
            echo "WAR déjà OK"
          fi

          ls webapp/target

      - name: 🐳 Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build Docker image
        run: docker build -t $IMAGE_NAME .

      - name: 📤 Push Docker image
        run: |
          docker tag $IMAGE_NAME ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest


  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔗 Connexion Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID_JO }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET_JO }}
          tags: tag:ci

      - name: 🐍 Installer Ansible
        run: |
          pip install ansible docker
          ansible-galaxy collection install community.docker

      - name: 🔑 Setup SSH (FIX ✅)
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa

          echo -e "Host *\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config

      - name: 🔍 Test connexion VM1
        run: |
          ssh vagrant@${{ secrets.VM1_IP }} "echo Connected ✅"

      - name: 🚀 Déploiement via VM1
        run: |
          ssh vagrant@${{ secrets.VM1_IP }} "
            cd /vagrant/Projet_Usine_Logicielle &&
            ansible-playbook -i ansible/inventory.ini ansible/deploy.yml \
            -e image_name=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          "

      - name: ✅ Fin du pipeline
        run: echo "✅ Déploiement terminé"