name: Java demo appweb CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: usine-logicielle-java

jobs:

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-demo-appweb-main

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: 📦 Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: 🧪 Tests serveur
        run: mvn -B -pl server test

      - name: 🏗️ Build WAR
        run: mvn -B clean package

      - name: 🔍 Debug fichiers
        run: ls webapp/target

      - name: 📦 Rename WAR
        run: |
          FILE=$(ls webapp/target/*.war | head -n 1)
          mv "$FILE" webapp/target/webapp.war

      - name: 📦 Upload WAR
        uses: actions/upload-artifact@v4
        with:
          name: webapp-war
          path: java-demo-appweb-main/webapp/target/webapp.war


  docker:
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: java-demo-appweb-main

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download WAR
        uses: actions/download-artifact@v4
        with:
          name: webapp-war
          path: java-demo-appweb-main/webapp/target

      - name: 🔍 Vérification WAR
        run: ls webapp/target

      - name: 🐳 Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build image
        run: docker build -t $IMAGE_NAME .

      - name: 📤 Push image
        run: |
          docker tag $IMAGE_NAME ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest


  # 🚀 3. DEPLOY (placeholder)
  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: 🚀 Deploy
        run: echo "Déploiement via Kubernetes / Ansible"