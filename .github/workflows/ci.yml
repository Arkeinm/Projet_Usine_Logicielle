name: Java demo appweb CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: usine-logicielle-java

jobs:
  # 🔐 Scan de secrets - tourne dès le push, aucune dépendance
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Scan Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 🧹 Lint du Dockerfile - tourne dès le push, aucune dépendance
  hadolint:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Scan Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: java-demo-appweb-main/Dockerfile
          failure-threshold: warning

  # 🧪 Tests Cucumber - tourne dès le push, aucune dépendance
  cucumber-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: java-demo-appweb-main

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: 📦 Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: 🧪 Exécution tests Cucumber
        run: mvn -B -pl server test

      - name: ✅ Résumé tests
        run: |
          echo "Tests Cucumber exécutés"

      - name: 📊 Upload rapport Cucumber HTML
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: java-demo-appweb-main/target/cucumber-report.html

  # 🔎 Scan des dépendances Java (CVE connues dans les libs Maven)
  dependency-check:
    runs-on: ubuntu-latest
    needs: cucumber-tests

    defaults:
      run:
        working-directory: java-demo-appweb-main

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "usine-logicielle-java"
          path: "java-demo-appweb-main"
          format: "HTML"
          out: "reports"
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: 📊 Upload rapport Dependency-Check
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: java-demo-appweb-main/reports

  # 🏗️ Build de l'application Java et création du WAR
  build:
    runs-on: ubuntu-latest
    needs: cucumber-tests
    defaults:
      run:
        working-directory: java-demo-appweb-main

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: 📦 Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: 🧪 Run server tests
        run: mvn -B -pl server test

      - name: 🏗️ Build WAR
        run: mvn -B clean package

      - name: 🔍 Vérification WAR
        run: ls webapp/target

      - name: 📦 Upload WAR
        uses: actions/upload-artifact@v4
        with:
          name: webapp-war
          path: java-demo-appweb-main/webapp/target/*.war

  # 🐳 Build et push de l'image Docker
  docker:
    runs-on: ubuntu-latest
    needs: [build, hadolint, gitleaks]
    environment: joseph

    defaults:
      run:
        working-directory: java-demo-appweb-main

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download WAR
        uses: actions/download-artifact@v4
        with:
          name: webapp-war
          path: java-demo-appweb-main/webapp/target

      - name: 🔍 Vérification
        run: ls webapp/target

      - name: 📦 Préparer WAR pour Docker
        run: |
          FILE=$(ls webapp/target/*.war | head -n 1)
          TARGET="webapp/target/webapp.war"

          if [ "$FILE" != "$TARGET" ]; then
            echo "Renommage WAR"
            cp "$FILE" "$TARGET"
          else
            echo "WAR déjà OK"
          fi

          ls webapp/target

      - name: 🐳 Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build Docker image
        run: docker build -t $IMAGE_NAME .

      - name: 📤 Push Docker image
        run: |
          docker tag $IMAGE_NAME ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest
          docker tag $IMAGE_NAME ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}

          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}

  # 🛡️ Scan de vulnérabilités sur l'image Docker construite
  trivy-scan:
    runs-on: ubuntu-latest
    needs: docker
    environment: joseph

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

