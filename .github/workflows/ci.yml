  # 🐳 Déploiement sur Kubernetes via GitOps
  Deploy-GitOps:
    runs-on: ubuntu-latest
    needs: trivy-scan
    environment: joseph

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Config Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "ci@github.com"

      - name: 🏷️ Tag image Docker
        run: |
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: 📝 Update deployment.yml
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" k8s/deployment.yml

      - name: 📤 Commit changes
        run: |
          git add k8s/deployment.yml
          git commit -m "ci: update image to ${{ github.sha }}" || echo "No changes"

      - name: 🚀 Push
        run: |
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
