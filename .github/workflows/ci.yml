name: Java demo appweb CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: usine-logicielle-java

jobs:

  cucumber-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: java-demo-appweb-main

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: 📦 Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: 🧪 Exécution tests Cucumber
        run: mvn -B -pl server test

      - name: ✅ Résumé tests
        run: |
          echo "Tests Cucumber exécutés"

  build:
    runs-on: ubuntu-latest
    needs: cucumber-tests
    defaults:
      run:
        working-directory: java-demo-appweb-main

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: 📦 Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: 🧪 Run server tests
        run: mvn -B -pl server test

      - name: 🏗️ Build WAR
        run: mvn -B clean package

      - name: 🔍 Vérification WAR
        run: ls webapp/target

      # ✅ Upload adapté (SANS rename, sans toucher build)
      - name: 📦 Upload WAR
        uses: actions/upload-artifact@v4
        with:
          name: webapp-war
          path: java-demo-appweb-main/webapp/target/*.war


  docker:
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: java-demo-appweb-main

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download WAR
        uses: actions/download-artifact@v4
        with:
          name: webapp-war
          path: java-demo-appweb-main/webapp/target

      - name: 🔍 Vérification
        run: ls webapp/target

      # ✅ copie vers le nom attendu par ton Dockerfile
      - name: 📦 Préparer WAR pour Docker
        run: |
          FILE=$(ls webapp/target/*.war | head -n 1)
          TARGET="webapp/target/webapp.war"

          if [ "$FILE" != "$TARGET" ]; then
            echo "Renommage WAR"
            cp "$FILE" "$TARGET"
          else
            echo "WAR déjà OK"
          fi

          ls webapp/target

      - name: 🐳 Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build Docker image
        run: docker build -t $IMAGE_NAME .

      - name: 📤 Push Docker image
        run: |
          docker tag $IMAGE_NAME ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest


  # 🚀 3. DEPLOY (placeholder)

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Vérification image Docker
        run: |
          echo "===================================="
          echo "✅ CI/CD terminé avec succès"
          echo "===================================="
          echo ""
          echo "Image Docker construite et publiée :"
          echo "→ $IMAGE_NAME"
          echo ""
          echo "Disponible sur Docker Hub ✅"

      - name: 🚀 Instruction de déploiement via VM1
        run: |
          echo "===================================="
          echo "🚀 DÉPLOIEMENT VIA VM1 (LOCAL)"
          echo "===================================="
          echo ""
          echo "1. Accéder à VM1 :"
          echo "   vagrant ssh VM1"
          echo ""
          echo "2. Aller dans le dossier partagé :"
          echo "   cd /vagrant"
          echo ""
          echo "3. Cloner le projet (si nécessaire) :"
          echo "   git clone https://github.com/Arkeinm/Projet_Usine_Logicielle.git"
          echo ""
          echo "4. Aller dans le projet :"
          echo "   cd Projet_Usine_Logicielle"
          echo ""
          echo "5. Lancer le déploiement :"
          echo "   ansible-playbook -i ansible/inventory.ini ansible/deploy.yml"
          echo ""
          echo "===================================="
          echo "✅ Résultat attendu :"
          echo "→ Déploiement sur VM2 et VM3"
          echo "→ Conteneurs Docker en cours d'exécution"
          echo "===================================="

      - name: ✅ Fin du pipeline
        run: echo "✅ Pipeline CI terminé - CD prêt"