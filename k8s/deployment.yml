apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-java
  template:
    metadata:
      labels:
        app: app-java
    spec:
      containers:
        - name: app-java
          image: jodelnord/usine-logicielle-java:a3ea773a05cfc683a1c76381a26526f83858033e
          ports:
            - containerPort: 8080
