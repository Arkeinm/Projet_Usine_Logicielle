apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-java
  template:
    metadata:
      labels:
        app: app-java
    spec:
      containers:
        - name: app-java
          image: jodelnord/usine-logicielle-java:7f5ee1d5440e29c087a5e7fb9fff2900d553b42a
          ports:
            - containerPort: 8080
