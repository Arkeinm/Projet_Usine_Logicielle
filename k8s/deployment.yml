apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-java
  template:
    metadata:
      labels:
        app: app-java
    spec:
      containers:
        - name: app-java
          image: jodelnord/usine-logicielle-java:cbe103fd2a7854350b41cd7aabfba8a7db40036c
          ports:
            - containerPort: 8080
