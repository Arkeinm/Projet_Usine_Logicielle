apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-java
  template:
    metadata:
      labels:
        app: app-java

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: app-java
          image: jodelnord/usine-logicielle-java:cf66fab4ea49b16954f3783c679c1912b11da01f
          ports:
            - containerPort: 8080
