apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-java
  template:
    metadata:
      labels:
        app: app-java
    spec:
      containers:
        - name: app-java
          image: jodelnord/usine-logicielle-java:1ce31373d177e57f6656fd6c9daad0cfb8805fa5
          ports:
            - containerPort: 8080
