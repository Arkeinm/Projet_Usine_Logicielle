apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-java
  template:
    metadata:
      labels:
        app: app-java

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: app-java
          image: jodelnord/usine-logicielle-java:3f8794d1a1c07a24156bb7dd21a874b3a487d45f
          ports:
            - containerPort: 8080
